<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小四數學互動教學</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.6; padding: 40px; max-width: 600px; margin: auto; background-color: #f4f7f6; }
        h1 { color: #2c3e50; text-align: center; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 15px 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        a { text-decoration: none; color: #3498db; font-weight: bold; font-size: 1.2em; display: block; }
        a:hover { color: #2980b9; }
    </style>
</head>
<body>
    <h1>互動教學目錄</h1>
    <p style="text-align: center;">歡迎使用教學工具，請點擊下方單元：</p>
    <ul id="game-list">
    </ul>

    <script>
        // --- 設定區 ---
        const version = "3"; // 已更新版本號，將數字 +1
        const games = [
            { name: "時鐘練習遊戲", file: "clockgame.html" } // 從「截圖 2026-06-06 上午8.33.51.png」新增此項
        ];

        // --- 自動產生目錄邏輯 ---
        const listElement = document.getElementById('game-list');
        games.forEach(game => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${game.file}?v=${version}">${game.name}</a>`;
            listElement.appendChild(li);
        });
    </script>
</body>
</html>
